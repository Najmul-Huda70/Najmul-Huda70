<svg width="850" height="200" viewBox="0 0 850 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #8b949e; }
      .num { font-family: 'Segoe UI', Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #ffffff; }
      .sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #8b949e; }
      .header { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #39FF14; }
    </style>
  </defs>

  <rect width="850" height="200" class="bg" rx="10"/>
  <text x="30" y="35" class="header">📊 Codeforces Activity — bit_riser</text>

  <!-- Card 1 -->
  <rect x="30" y="55" width="250" height="120" rx="8" class="card"/>
  <text x="50" y="100" class="num">700</text>
  <text x="50" y="122" class="title">problems</text>
  <text x="50" y="140" class="sub">solved for all time</text>

  <!-- Card 2 -->
  <rect x="300" y="55" width="250" height="120" rx="8" class="card"/>
  <text x="320" y="100" class="num">157</text>
  <text x="320" y="122" class="title">problems</text>
  <text x="320" y="140" class="sub">solved in the last year</text>

  <!-- Card 3 -->
  <rect x="570" y="55" width="250" height="120" rx="8" class="card"/>
  <text x="590" y="100" class="num">42</text>
  <text x="590" y="122" class="title">days</text>
  <text x="590" y="140" class="sub">max streak in a row</text>

</svg>
