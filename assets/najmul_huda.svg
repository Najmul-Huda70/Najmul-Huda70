<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101418"/>
      <stop offset="100%" stop-color="#1B2028"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- large faint monogram, right side, purely decorative -->
  <text x="1560" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="300" font-weight="700"
        fill="#FFFFFF" opacity="0.035" text-anchor="end">NH</text>

  <!-- thin rule, centered above the name -->
  <rect x="732" y="88" width="120" height="3" fill="#E8B14C"/>

  <!-- Name — centered on the banner, clear of the photo -->
  <text x="792" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600"
        fill="#F5F5F0" letter-spacing="0.5">Najmul Huda</text>

  <!-- Tagline — centered -->
  <text x="792" y="206" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="19" fill="#B9BEC6" letter-spacing="1">
    WEB DEVELOPER<tspan fill="#E8B14C">  |  </tspan>COMPETITIVE PROGRAMMER<tspan fill="#E8B14C">  |  </tspan>CSE STUDENT
  </text>

  <!-- accent line, centered -->
  <rect x="632" y="228" width="320" height="1.5" fill="#E8B14C" opacity="0.6"/>

  <!-- Contact block — centered below tagline -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#D9DCE1" text-anchor="middle">
    <text x="792" y="262">
      <tspan fill="#E8B14C">✉</tspan>  contact.najmulhuda@gmail.com<tspan fill="#4A505C">    |    </tspan><tspan fill="#E8B14C">☎</tspan>  +880 1888 376370
    </text>
  </g>
</svg>
